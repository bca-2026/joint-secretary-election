<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{

    width:430px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.login-box h2{

    text-align:center;
    margin-bottom:30px;
    color:#2563eb;

}

.input{

    margin-bottom:20px;

}

.input label{

    display:block;
    margin-bottom:8px;
    font-weight:600;

}

.input input{

    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;

}

button{

    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

#error{

    margin-top:20px;
    text-align:center;
    color:red;
    font-weight:600;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Administrator Login</h2>

<form id="adminLogin">

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="admin@email.com"
required>

</div>

<div class="input">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Password"
required>

</div>

<button>

Login

</button>

</form> 
<br>

<a href="index.html"><p align="center">VOTERS LOGIN</p></a>

<div id="error"></div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="admin_login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="../css/admin.css">

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="sidebar">

    <h2>Election</h2>

    <ul>

        <li>
            <a href="dashboard.html">
                <i class="fa fa-home"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="voters.html">
                <i class="fa fa-users"></i>
                Voters
            </a>
        </li>

        <li>
            <a href="import.html">
                <i class="fa fa-file-import"></i>
                Import Voters
            </a>
        </li>

        <li>
            <a href="candidates.html">
                <i class="fa fa-user-tie"></i>
                Candidates
            </a>
        </li>

        <li>
            <a href="manage-candidate.html">
                <i class="fa fa-user-tie"></i>
                Edit Candidate
            </a>
        </li>
        <li>
            <a href="results.html">
                <i class="fa fa-chart-column"></i>
                Results
            </a>
        </li>

        <li>
            <a href="election-setting.html">
                <i class="fa fa-gear"></i>
                Election Settings
            </a>
        </li>

        <li>
            <a href="login.html" id="logout">
                <i class="fa fa-right-from-bracket"></i>
                Logout
            </a>
        </li>

    </ul>

</div>

<div class="main">

    <div class="topbar">

        <h1>Dashboard</h1>

    </div>

    <div class="cards">

        <div class="card blue">

            <h3>Total Voters</h3>

            <h1 id="totalVoters">0</h1>

        </div>

        <div class="card green">

            <h3>Votes Cast</h3>

            <h1 id="votesCast">0</h1>

        </div>

        <div class="card orange">

            <h3>Remaining</h3>

            <h1 id="remainingVotes">0</h1>

        </div>

        <div class="card purple">

            <h3>Candidates</h3>

            <h1 id="candidateCount">0</h1>

        </div>

    </div>

    <div class="table-box">

        <h2>Quick Actions</h2>

        <div class="actions">

            <a href="voters.html" class="btn">
                Manage Voters
            </a>

            <a href="import-voters.html" class="btn">
                Import Excel
            </a>

            <a href="candidates.html" class="btn">
                Manage Candidates
            </a>

            <a href="results.html" class="btn">
                View Results
            </a>

        </div>

    </div>

</div>

<script type="module" src="../js/firebase.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Election System</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="style.css">

</head>
<body>

<div class="container">

    <div class="login-card">

        <div class="logo">
            <i class="fa-solid fa-check-to-slot"></i>
        </div>

        <h1>Online Election</h1>

        <p>Secure Voting Portal</p>

        <form id="loginForm">

            <div class="input-group">

                <label>Voter ID</label>

                <input
                    type="text"
                    id="voterId"
                    placeholder="Enter Voter ID"
                    required>

            </div>

            <div class="input-group">

                <label>Voter Key</label>

                <input
                    type="password"
                    id="voterKey"
                    placeholder="Enter Voter Key"
                    required>

            </div>

            <button type="submit" class="login-btn">

                Login

            </button>
            


        </form><br><br>
        
        <a href="login.html"><p align="Center">Adminstrator Login</p></a>
        

        <div id="message"></div>

    </div>

</div>

<!-- Firebase -->

<script type="module" src="firebase.js"></script>
    
<script type="module">
    import { db } from "./firebase.js";

import {
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.querySelector("form").addEventListener("submit", async (e) => {

    e.preventDefault();

    const voterId = document.getElementById("voterId").value.trim();
    const voterKey = document.getElementById("voterKey").value.trim();

    console.log("Searching:", voterId, voterKey);

    try {

        const q = query(
            collection(db, "voters"),
            where("voterId", "==", voterId)
        );

        const snap = await getDocs(q);

        console.log("Documents Found:", snap.size);

        if (snap.empty) {
            alert("Voter ID not found");
            return;
        }

        const voter = snap.docs[0].data();

        console.log(voter);

        if (String(voter.voterKey) !== voterKey) {
            alert("Invalid Voter Key");
            return;
        }

        if (voter.hasVoted) {
            alert("You have already voted.");
            return;
        }

        localStorage.setItem("voterId", voterId);

        alert("Login Successful");

        window.location.href = "vote.html";

    } catch (err) {

        console.error(err);

        alert(err.message);

    }

});
</script>

</body>
</html>
